<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragons of Icespire Peak — Spillerportal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f2e8c9;
    --parchment-dark: #e8d9a8;
    --parchment-mid: #ede0b5;
    --gold: #b8862a;
    --gold-light: #d4a843;
    --rust: #8b2e0a;
    --ash: #3d3020;
    --ember: #c44a0a;
    --shadow: rgba(20, 10, 0, 0.55);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0d0a05;
    color: var(--ink);
    font-family: 'IM Fell English', Georgia, serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,90,10,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 80%, rgba(150,60,5,0.12) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: candleflicker 6s ease-in-out infinite alternate;
  }
  @keyframes candleflicker {
    0%   { opacity: 0.8; }
    30%  { opacity: 1.0; }
    60%  { opacity: 0.85; }
    100% { opacity: 1.0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
    position: relative;
    z-index: 1;
  }
  header.site-header {
    text-align: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s 0.2s forwards;
  }
  .kicker {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-light);
  }
  h1.site-title {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--parchment);
    margin: 0.4rem 0 0.3rem;
    text-shadow: 0 0 20px rgba(180,100,20,0.4);
  }
  .site-mood {
    font-style: italic;
    color: var(--gold-light);
    font-size: 1rem;
  }

  /* Ribbon-bookmark tab navigation — the signature element */
  nav.tabs {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin: 2.2rem 0 0;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }
  .tab-btn {
    position: relative;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--parchment-dark);
    background: linear-gradient(180deg, var(--rust), #6b2308);
    border: none;
    padding: 0.7rem 1.1rem 0.9rem;
    cursor: pointer;
    clip-path: polygon(0 0, 100% 0, 100% 78%, 50% 100%, 0 78%);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .tab-btn:hover { transform: translateY(2px); }
  .tab-btn.active {
    background: linear-gradient(180deg, var(--ember), var(--rust));
    color: var(--parchment);
  }

  .scroll-panel {
    background: radial-gradient(ellipse at 50% 0%, var(--parchment) 0%, var(--parchment-dark) 100%);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 2rem 2.2rem;
    margin: 2rem 0 2.5rem;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    position: relative;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s forwards;
  }
  .panel-heading {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--rust);
    margin-top: 0;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .empty-state {
    font-style: italic;
    color: var(--ash);
    opacity: 0.8;
  }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.1rem;
  }
  .card {
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
    background: var(--parchment-mid);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 1rem 1.2rem;
  }
  .card-media {
    flex: 0 0 130px;
    width: 130px;
    height: 92px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid var(--gold);
    cursor: zoom-in;
    transition: opacity 0.15s ease;
  }
  .card-media:hover {
    opacity: 0.85;
  }
  .card-media-item {
    flex: 0 0 150px;
    width: 150px;
    height: auto;
    max-height: 220px;
    object-fit: contain;
    background: rgba(26,18,8,0.08);
  }
  .lightbox-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12, 9, 6, 0.93);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    cursor: zoom-out;
  }
  .lightbox-overlay.open {
    display: flex;
  }
  .lightbox-img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 10px 45px rgba(0, 0, 0, 0.65);
  }
  .card-body {
    flex: 1 1 auto;
    min-width: 0;
  }
  .card-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--rust);
    font-size: 1rem;
    margin-bottom: 0.15rem;
  }
  .card-meta {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }
  .card-desc {
    font-size: 0.95rem;
    line-height: 1.55;
  }
  .card-audio {
    display: block;
    width: 100%;
    margin-top: 0.7rem;
  }
  .audio-link-btn {
    display: inline-block;
    margin-top: 0.7rem;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--rust);
    padding: 0.45rem 0.9rem;
    border-radius: 3px;
    text-decoration: none;
  }
  .audio-link-btn:hover {
    opacity: 0.88;
  }
  .map-wrap-portal {
    position: relative;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--gold);
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    margin-bottom: 1rem;
  }
  .map-image-portal { width: 100%; display: block; }
  .map-pin-portal {
    position: absolute;
    transform: translate(-50%, -100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .map-pin-dot-portal {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ember);
    border: 2px solid var(--gold-light);
    box-shadow: 0 0 8px rgba(196,74,10,0.7);
    transition: transform 0.15s ease;
  }
  .map-pin-portal:hover .map-pin-dot-portal,
  .map-pin-portal.active .map-pin-dot-portal {
    transform: scale(1.3);
  }
  .map-pin-label-portal {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.03em;
    white-space: nowrap;
    background: rgba(20,10,0,0.82);
    color: var(--parchment);
    padding: 0.15rem 0.55rem;
    border-radius: 2px;
    margin-top: 0.25rem;
  }
  .map-pin-detail { margin-top: 1.2rem; }
  .map-pin-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,10,0,0.95);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    min-width: 180px;
    max-width: 260px;
    white-space: normal;
    z-index: 20;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .map-pin-portal:hover .map-pin-tooltip {
    display: block;
  }
  .map-pin-tooltip-row {
    font-size: 0.72rem;
    color: var(--parchment-dark);
    line-height: 1.4;
    margin-bottom: 0.25rem;
  }
  .map-pin-tooltip-row:last-child { margin-bottom: 0; }
  .map-pin-tooltip-row strong {
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.1rem;
  }
  .map-shop-link { cursor: pointer; }
  .map-shop-link:hover { background: rgba(184,134,42,0.1); }
  .group-heading {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(184,134,42,0.4);
  }
  .pc-card { padding: 0; overflow: hidden; }
  .pc-card-clickable { display: flex; gap: 1.2rem; align-items: flex-start; padding: 1rem 1.2rem; cursor: pointer; }
  .pc-card-clickable:hover { background: rgba(184,134,42,0.08); }
  .pc-toggle-hint {
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--gold); opacity: 0.8; font-weight: 600; margin-left: 0.4rem;
  }
  .pc-detail { padding: 0 1.2rem 1.2rem; border-top: 1px solid rgba(184,134,42,0.3); margin-top: 0; }
  .pc-section { margin-top: 1.1rem; }
  .pc-section-heading {
    font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--rust); margin: 0 0 0.6rem;
  }
  .pc-section .card-list { gap: 0.7rem; }
  .pc-section .card { padding: 0.7rem 0.9rem; }
  .pc-empty-note { padding: 0.8rem 1.2rem 1.2rem; font-size: 0.85rem; opacity: 0.7; font-style: italic; }
  .pc-secrets {
    background: linear-gradient(135deg, var(--ink), #2a1d0f);
    border-radius: 4px;
    padding: 1rem 1.1rem 0.4rem;
    margin-top: 1.3rem;
    box-shadow: inset 0 0 24px rgba(196,74,10,0.15), 0 0 0 1px rgba(184,134,42,0.4);
  }
  .pc-secrets .pc-section-heading { color: var(--gold-light); }
  .pdf-embed-wrap { margin-top: 0.7rem; }
  .pdf-embed {
    width: 100%;
    height: 480px;
    border: 1px solid var(--gold);
    border-radius: 4px;
    background: #fff;
  }
  .pdf-open-link {
    display: inline-block;
    margin-top: 0.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--rust);
    padding: 0.4rem 0.8rem;
    border-radius: 3px;
    text-decoration: none;
  }
  .pdf-open-link:hover { opacity: 0.88; }
  .secret-card {
    background: rgba(242,232,201,0.06);
    border: 1px solid rgba(184,134,42,0.35);
  }
  .secret-card .card-name { color: var(--parchment); }
  .secret-card .card-desc { color: var(--parchment-dark); }
  .secret-card .card-meta { color: var(--gold-light); }
  .secret-kind-tag {
    display: inline-block; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.06em;
    text-transform: uppercase; background: rgba(196,74,10,0.3); color: var(--gold-light);
    padding: 0.12rem 0.5rem; border-radius: 2px; margin-left: 0.4rem; vertical-align: middle;
  }

  .shop-card {
    display: block;
    cursor: pointer;
    text-align: center;
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .shop-card:hover { transform: translateY(-2px); border-color: var(--ember); }
  .shop-card.active { border-color: var(--ember); background: var(--parchment-dark); }
  .shop-card .shop-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
  .shop-card .card-name { margin-bottom: 0; }
  .shop-card .card-meta { margin-bottom: 0; }

  #shop-detail { margin-top: 1.5rem; }
  .shop-detail-title {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--rust);
    font-size: 1.15rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 0.5rem;
  }
  .shop-detail-title .keeper {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    color: var(--ash);
    font-size: 0.95rem;
  }
  table.shop-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  table.shop-table th {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: left;
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--gold);
  }
  table.shop-table td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px solid rgba(184,134,42,0.25);
    vertical-align: top;
  }
  table.shop-table tr.sold-out { opacity: 0.55; }
  .item-name { font-weight: 600; color: var(--ink); }
  .item-rules { font-size: 0.82rem; color: var(--ash); margin-top: 0.2rem; line-height: 1.4; }
  .qty-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
  }
  .qty-ok { background: rgba(74,124,89,0.18); color: #3d6b48; }
  .qty-low { background: rgba(199,126,37,0.2); color: #a05f1a; }
  .qty-sold { background: rgba(192,57,43,0.18); color: #a5312a; }
  .item-price { font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); white-space: nowrap; }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem 0;
    opacity: 0.7;
    color: var(--gold);
    font-size: 0.9rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  footer {
    text-align: center;
    color: var(--gold-light);
    font-style: italic;
    opacity: 0.75;
    margin-top: 3rem;
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header">
    <div class="kicker" id="site-kicker">Dragons of Icespire Peak</div>
    <h1 class="site-title" id="site-title">Phandalins Krønike</h1>
    <div class="site-mood" id="site-mood">Folk, fund og fortællinger fra ekspeditionen</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="map" id="tabbtn-map">Kort</button>
    <button class="tab-btn" data-tab="sessions" id="tabbtn-sessions">Session-logs</button>
    <button class="tab-btn" data-tab="npcs" id="tabbtn-npcs">Folk vi har mødt</button>
    <button class="tab-btn" data-tab="items" id="tabbtn-items">Fund &amp; genstande</button>
    <button class="tab-btn" data-tab="shops" id="tabbtn-shops">Butikker</button>
  </nav>

  <section id="tab-map" class="tab-panel scroll-panel">
    <h2 class="panel-heading" id="heading-map">Kort</h2>
    <div id="map-container"><p class="empty-state">Intet kort tilføjet endnu.</p></div>
  </section>

  <section id="tab-sessions" class="tab-panel scroll-panel" style="display:none;">
    <h2 class="panel-heading" id="heading-sessions">Session-logs</h2>
    <div id="sessions-list"><p class="empty-state">Ingen sessions lagt op endnu.</p></div>
  </section>

  <section id="tab-npcs" class="tab-panel scroll-panel" style="display:none;">
    <h2 class="panel-heading" id="heading-npcs">Folk vi har mødt</h2>
    <div id="npcs-list"><p class="empty-state">Ingen indgange lagt op endnu.</p></div>
  </section>

  <section id="tab-items" class="tab-panel scroll-panel" style="display:none;">
    <h2 class="panel-heading" id="heading-items">Fund &amp; genstande</h2>
    <div id="items-list"></div>
  </section>

  <section id="tab-shops" class="tab-panel scroll-panel" style="display:none;">
    <h2 class="panel-heading" id="heading-shops">Butikker</h2>
    <div id="shops-grid" class="card-grid"></div>
    <div id="shop-detail"></div>
  </section>

  <div class="divider">⚔</div>
  <footer>Fortsættes...</footer>
</div>

<div id="lightbox-overlay" class="lightbox-overlay">
  <img id="lightbox-img" class="lightbox-img" src="" alt="">
</div>

<script>
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tab-panel');
  function switchToTab(tabKey) {
    tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tabKey));
    panels.forEach(p => { p.style.display = (p.id === 'tab-' + tabKey) ? 'block' : 'none'; });
  }
  tabs.forEach(btn => {
    btn.addEventListener('click', () => switchToTab(btn.dataset.tab));
  });

  async function loadJSON(path) {
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error('not found');
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str ?? '';
    return d.innerHTML;
  }

  let portalLabels = {};
  function L(key, fallback) {
    return (portalLabels[key] && portalLabels[key].trim()) || fallback;
  }

  const labelsReady = loadJSON('data/labels.json').then(data => {
    portalLabels = data || {};
    const setText = (id, key, fallback) => {
      const el = document.getElementById(id);
      if (el) el.textContent = L(key, fallback);
    };
    setText('tabbtn-sessions', 'sessions', 'Session-logs');
    setText('heading-sessions', 'sessions', 'Session-logs');
    setText('tabbtn-npcs', 'npcs', 'Folk vi har mødt');
    setText('heading-npcs', 'npcs', 'Folk vi har mødt');
    setText('tabbtn-items', 'items', 'Fund & genstande');
    setText('heading-items', 'items', 'Fund & genstande');
    setText('tabbtn-shops', 'shops', 'Butikker');
    setText('heading-shops', 'shops', 'Butikker');
    setText('tabbtn-map', 'map', 'Kort');
    setText('heading-map', 'map', 'Kort');
    setText('site-kicker', 'site_kicker', 'Dragons of Icespire Peak');
    setText('site-title', 'site_title', 'Phandalins Krønike');
    setText('site-mood', 'site_mood', 'Folk, fund og fortællinger fra ekspeditionen');
  });

  Promise.all([loadJSON('data/map.json'), loadJSON('data/npcs.json'), loadJSON('data/sessions.json'), loadJSON('data/shops.json'), labelsReady]).then(([mapData, npcData, sessionsData, shopsJson]) => {
    const container = document.getElementById('map-container');
    if (!mapData || !mapData.image) return;
    const allNpcs = (npcData && npcData.npcs) || [];
    const allSessions = (sessionsData && sessionsData.sessions) || [];
    const allShops = (Array.isArray(shopsJson) ? shopsJson : []).filter(s => s.enabled !== false);
    const norm = s => (s || '').trim().toLowerCase();
    let openPinName = null;

    function pinTooltipHTML(pinName) {
      const peopleNames = allNpcs.filter(n => norm(n.mapPin) === norm(pinName)).map(n => n.name);
      const shopNames = allShops.filter(s => norm(s.mapPin) === norm(pinName)).map(s => s.name);
      const sessionTitles = allSessions.filter(s => norm(s.mapPin) === norm(pinName)).map(s => s.title);
      if (!peopleNames.length && !shopNames.length && !sessionTitles.length) return '';
      return `<div class="map-pin-tooltip">
        ${peopleNames.length ? `<div class="map-pin-tooltip-row"><strong>Folk:</strong> ${peopleNames.map(esc).join(', ')}</div>` : ''}
        ${shopNames.length ? `<div class="map-pin-tooltip-row"><strong>Butikker:</strong> ${shopNames.map(esc).join(', ')}</div>` : ''}
        ${sessionTitles.length ? `<div class="map-pin-tooltip-row"><strong>Sessioner:</strong> ${sessionTitles.map(esc).join(', ')}</div>` : ''}
      </div>`;
    }

    function pinDetailHTML(pinName) {
      const here = allNpcs.filter(n => norm(n.mapPin) === norm(pinName));
      const sessionsHere = allSessions.filter(s => norm(s.mapPin) === norm(pinName));
      const shopsHere = allShops.filter(s => norm(s.mapPin) === norm(pinName));
      if (!here.length && !sessionsHere.length && !shopsHere.length) {
        return `<div class="pc-empty-note">Intet tilknyttet ${esc(pinName)} endnu.</div>`;
      }
      const peopleHTML = here.length ? `
        <div class="pc-section">
          <h4 class="pc-section-heading">Folk her</h4>
          <div class="card-list">
            ${here.map(n => `
              <div class="card">
                ${n.image ? `<img class="card-media card-media-item" src="${esc(n.image)}" alt="">` : ''}
                <div class="card-body">
                  <div class="card-name">${esc(n.name)}</div>
                  <div class="card-meta">${esc(n.title || '')}${n.kind ? ' · ' + esc(n.kind) : ''}</div>
                  <div class="card-desc">${esc(n.description || '')}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>` : '';
      const shopsHTML = shopsHere.length ? `
        <div class="pc-section">
          <h4 class="pc-section-heading">⚖️ Butikker her</h4>
          <div class="card-list">
            ${shopsHere.map(s => `
              <div class="card map-shop-link" data-jump-shop="${esc(s.id)}">
                <div class="card-body">
                  <div class="card-name">${esc(s.icon || '⚖️')} ${esc(s.name)} <span class="pc-toggle-hint">▶ Åbn butik</span></div>
                  <div class="card-meta">${esc(s.keeper || '')}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>` : '';
      const sessionsHTML = sessionsHere.length ? `
        <div class="pc-section">
          <h4 class="pc-section-heading">📖 Sessioner her</h4>
          <div class="card-list">
            ${sessionsHere.map(s => `
              <div class="card">
                ${s.image ? `<img class="card-media card-media-item" src="${esc(s.image)}" alt="">` : ''}
                <div class="card-body">
                  <div class="card-name">${esc(s.title)}</div>
                  <div class="card-meta">${s.number ? 'Session ' + esc(String(s.number)) : ''}${s.date ? ' · ' + esc(s.date) : ''}</div>
                  <div class="card-desc">${esc(s.recap || '')}</div>
                  ${renderAudioBlock(s.audio)}
                </div>
              </div>`).join('')}
          </div>
        </div>` : '';
      return `<div class="map-pin-detail"><h3 class="group-heading">📍 ${esc(pinName)}</h3>${peopleHTML}${shopsHTML}${sessionsHTML}</div>`;
    }

    function renderMap() {
      container.innerHTML = `
        <div class="map-wrap-portal" id="mapWrapPortal">
          <img src="${esc(mapData.image)}" class="map-image-portal" alt="Kort">
          ${(mapData.pins || []).filter(p => !p.hidden).map(p => `
            <div class="map-pin-portal ${openPinName === p.name ? 'active' : ''}" data-pin="${esc(p.name)}" style="left:${p.x}%; top:${p.y}%;">
              <span class="map-pin-dot-portal"></span>
              <span class="map-pin-label-portal">${esc(p.name)}</span>
              ${pinTooltipHTML(p.name)}
            </div>`).join('')}
        </div>
        ${openPinName ? pinDetailHTML(openPinName) : '<p class="empty-state" style="margin-top:1rem;">Klik på et sted på kortet for at se, hvem og hvad der hører til der. Før musen hen over et sted for en hurtig oversigt.</p>'}`;
      container.querySelectorAll('[data-pin]').forEach(el => {
        el.addEventListener('click', () => {
          const name = el.dataset.pin;
          openPinName = (openPinName === name) ? null : name;
          renderMap();
        });
      });
      container.querySelectorAll('[data-jump-shop]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          jumpToShop(el.dataset.jumpShop);
        });
      });
    }
    renderMap();
  });

  let pcExpandedName = null;

  Promise.all([
    loadJSON('data/npcs.json'),
    loadJSON('data/items.json'),
    loadJSON('data/personal.json'),
    labelsReady
  ]).then(([npcData, itemsData, personalData]) => {
    if (!npcData || !npcData.npcs || !npcData.npcs.length) return;
    const allItems = (itemsData && itemsData.items) || [];
    const allPersonal = (personalData && personalData.personal) || [];
    const groups = { 'NPC': [], 'Spillerkarakter': [] };
    npcData.npcs.forEach(n => (groups[n.kind] || groups['NPC']).push(n));
    const norm = s => (s || '').trim().toLowerCase();

    function pcDetailHTML(n) {
      const myItems = allItems.filter(i => norm(i.owner) === norm(n.name) && i.visibility !== 'Skjult');
      const myNotes = allPersonal.filter(p => norm(p.character) === norm(n.name) && p.kind === 'Note/Brev');
      const mySecrets = allPersonal.filter(p => norm(p.character) === norm(n.name) && p.kind !== 'Note/Brev');

      const itemsHTML = myItems.length ? `
        <div class="pc-section">
          <h4 class="pc-section-heading">💰 Mine genstande</h4>
          <div class="card-list">${myItems.map(i => `
            <div class="card">
              ${i.image ? `<img class="card-media card-media-item" src="${esc(i.image)}" alt="">` : ''}
              <div class="card-body">
                <div class="card-name">${esc(i.name)}</div>
                ${i.rarity ? `<div class="card-meta">${esc(i.rarity)}</div>` : ''}
                ${i.description ? `<div class="card-desc">${esc(i.description)}</div>` : ''}
              </div>
            </div>`).join('')}</div>
        </div>` : '';

      const notesHTML = myNotes.length ? `
        <div class="pc-section">
          <h4 class="pc-section-heading">✉ Noter &amp; breve</h4>
          <div class="card-list">${myNotes.map(p => `
            <div class="card">
              ${p.image ? `<img class="card-media card-media-item" src="${esc(p.image)}" alt="">` : ''}
              <div class="card-body">
                <div class="card-name">${esc(p.title)}</div>
                ${p.date ? `<div class="card-meta">${esc(p.date)}</div>` : ''}
                <div class="card-desc">${esc(p.content || '')}</div>
                ${renderPdfBlock(p.pdf)}
              </div>
            </div>`).join('')}</div>
        </div>` : '';

      const secretsHTML = mySecrets.length ? `
        <div class="pc-section pc-secrets">
          <h4 class="pc-section-heading">🔮 Hemmelige beskeder</h4>
          <div class="card-list">${mySecrets.map(p => `
            <div class="card secret-card">
              ${p.image ? `<img class="card-media card-media-item" src="${esc(p.image)}" alt="">` : ''}
              <div class="card-body">
                <div class="card-name">${esc(p.title)} <span class="secret-kind-tag">${esc(p.kind)}</span></div>
                ${p.date ? `<div class="card-meta">${esc(p.date)}</div>` : ''}
                <div class="card-desc">${esc(p.content || '')}</div>
                ${renderPdfBlock(p.pdf)}
              </div>
            </div>`).join('')}</div>
        </div>` : '';

      if (!itemsHTML && !notesHTML && !secretsHTML) {
        return `<div class="pc-empty-note">Intet registreret endnu for ${esc(n.name)}.</div>`;
      }
      return `<div class="pc-detail">${itemsHTML}${notesHTML}${secretsHTML}</div>`;
    }

    function pcCardHTML(n) {
      const isOpen = pcExpandedName === n.name;
      return `
        <div class="card pc-card">
          <div class="pc-card-clickable" data-pc-toggle="${esc(n.name)}">
            ${n.image ? `<img class="card-media card-media-item" src="${esc(n.image)}" alt="">` : ''}
            <div class="card-body">
              <div class="card-name">${esc(n.name)} <span class="pc-toggle-hint">${isOpen ? '▲ Skjul' : '▼ Se mine ting'}</span></div>
              <div class="card-meta">${esc(n.title || '')}${n.location ? ' · ' + esc(n.location) : ''}</div>
              <div class="card-desc">${esc(n.description || '')}</div>
            </div>
          </div>
          ${isOpen ? pcDetailHTML(n) : ''}
        </div>`;
    }

    const renderGroup = (label, list, clickable) => {
      if (!list.length) return '';
      return `<h3 class="group-heading">${esc(label)}</h3><div class="card-list" style="margin-bottom:1.6rem;">` +
        (clickable ? list.map(pcCardHTML).join('') : list.map(n => `
          <div class="card">
            ${n.image ? `<img class="card-media card-media-item" src="${esc(n.image)}" alt="">` : ''}
            <div class="card-body">
              <div class="card-name">${esc(n.name)}</div>
              <div class="card-meta">${esc(n.title || '')}${n.location ? ' · ' + esc(n.location) : ''}</div>
              <div class="card-desc">${esc(n.description || '')}</div>
            </div>
          </div>`).join('')) + `</div>`;
    };

    function renderAll() {
      document.getElementById('npcs-list').innerHTML =
        renderGroup(L('npcs_npc', 'NPC\u2019er'), groups['NPC'], false) +
        renderGroup(L('npcs_pc', 'Spillernes karakterer'), groups['Spillerkarakter'], true);
      document.querySelectorAll('[data-pc-toggle]').forEach(el => {
        el.addEventListener('click', () => {
          const name = el.dataset.pcToggle;
          pcExpandedName = (pcExpandedName === name) ? null : name;
          renderAll();
        });
      });
    }
    renderAll();
  });

  loadJSON('data/items.json').then(data => {
    if (!data || !data.items || !data.items.length) return;
    const visibleItems = data.items.filter(i => i.visibility !== 'Skjult');
    if (!visibleItems.length) return;
    document.getElementById('items-list').innerHTML = `<div class="card-list">` + visibleItems.map(i => `
      <div class="card">
        ${i.image ? `<img class="card-media card-media-item" src="${esc(i.image)}" alt="">` : ''}
        <div class="card-body">
          <div class="card-name">${esc(i.name)}</div>
          <div class="card-meta">${esc(i.rarity || '')}</div>
          ${i.description ? `<div class="card-desc">${esc(i.description)}</div>` : ''}
        </div>
      </div>`).join('') + `</div>`;
  });

  function isDirectAudioFile(url) {
    return /\.(mp3|wav|ogg|m4a|aac|flac|opus)(\?.*)?$/i.test(url || '');
  }

  function renderAudioBlock(url) {
    if (!url) return '';
    if (isDirectAudioFile(url)) {
      return `<audio class="card-audio" controls src="${esc(url)}"></audio>`;
    }
    return `<a class="audio-link-btn" href="${esc(url)}" target="_blank" rel="noopener">🔗 Lyt til optagelsen ▶</a>`;
  }

  function renderPdfBlock(url) {
    if (!url) return '';
    return `<div class="pdf-embed-wrap">
      <iframe src="${esc(url)}" class="pdf-embed" loading="lazy" title="PDF-dokument"></iframe>
      <a href="${esc(url)}" target="_blank" rel="noopener" class="pdf-open-link">📄 Åbn PDF i fuld skærm</a>
    </div>`;
  }

  loadJSON('data/sessions.json').then(data => {
    if (!data || !data.sessions || !data.sessions.length) return;
    document.getElementById('sessions-list').innerHTML = `<div class="card-list">` + data.sessions.map(s => `
      <div class="card">
        ${s.image ? `<img class="card-media card-media-item" src="${esc(s.image)}" alt="">` : ''}
        <div class="card-body">
          <div class="card-name">${esc(s.title)}</div>
          <div class="card-meta">${s.number ? 'Session ' + esc(String(s.number)) : ''}${s.date ? ' · ' + esc(s.date) : ''}</div>
          <div class="card-desc">${esc(s.recap || '')}</div>
          ${renderAudioBlock(s.audio)}
        </div>
      </div>`).join('') + `</div>`;
  });

  let shopsData = [];
  let activeShopId = null;

  function renderShopGrid() {
    document.getElementById('shops-grid').innerHTML = shopsData.map(shop => {
      const soldOut = shop.items.filter(i => i.qty === 0).length;
      return `
        <div class="card shop-card ${shop.id === activeShopId ? 'active' : ''}" data-shop="${esc(shop.id)}">
          <div class="shop-icon">${esc(shop.icon || '⚖️')}</div>
          <div class="card-name">${esc(shop.name)}</div>
          <div class="card-meta">${esc(shop.keeper || '')}</div>
          <div class="card-desc">${shop.items.length} varer${soldOut ? ' · ' + soldOut + ' udsolgt' : ''}</div>
        </div>`;
    }).join('');
    document.querySelectorAll('.shop-card').forEach(card => {
      card.addEventListener('click', () => {
        activeShopId = activeShopId === card.dataset.shop ? null : card.dataset.shop;
        renderShopGrid();
        renderShopDetail();
      });
    });
  }

  function renderShopDetail() {
    const detail = document.getElementById('shop-detail');
    const shop = shopsData.find(s => s.id === activeShopId);
    if (!shop) { detail.innerHTML = ''; return; }
    detail.innerHTML = `
      <div class="shop-detail-title">${esc(shop.icon || '')} ${esc(shop.name)} <span class="keeper">— ${esc(shop.keeper || '')}</span></div>
      <table class="shop-table">
        <thead><tr><th>Genstand</th><th>Type</th><th>Pris</th><th>Antal</th></tr></thead>
        <tbody>
          ${shop.items.map(item => `
            <tr class="${item.qty === 0 ? 'sold-out' : ''}">
              <td>
                <div class="item-name">${esc(item.name)}</div>
                ${item.rules ? `<div class="item-rules">${esc(item.rules)}</div>` : ''}
              </td>
              <td>${esc(item.type || '')}</td>
              <td class="item-price">${esc(item.price || '')}</td>
              <td><span class="qty-badge ${item.qty === 0 ? 'qty-sold' : item.qty <= 2 ? 'qty-low' : 'qty-ok'}">${item.qty === 0 ? 'Udsolgt' : '×' + item.qty}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  loadJSON('data/shops.json').then(data => {
    if (!data || !Array.isArray(data)) {
      document.getElementById('shops-grid').innerHTML = '<p class="empty-state">Ingen butikker lagt op endnu.</p>';
      return;
    }
    shopsData = data.filter(s => s.enabled !== false);
    if (!shopsData.length) {
      document.getElementById('shops-grid').innerHTML = '<p class="empty-state">Ingen butikker lagt op endnu.</p>';
      return;
    }
    renderShopGrid();
  });

  function jumpToShop(shopId) {
    switchToTab('shops');
    activeShopId = shopId;
    renderShopGrid();
    renderShopDetail();
    document.getElementById('tab-shops').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Klik på et vare-/portræt-billede åbner det i fuld størrelse
  const lightbox = document.getElementById('lightbox-overlay');
  const lightboxImg = document.getElementById('lightbox-img');
  document.addEventListener('click', (e) => {
    const img = e.target.closest('img.card-media');
    if (img) {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || '';
      lightbox.classList.add('open');
    }
  });
  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { lightbox.classList.remove('open'); lightboxImg.src = ''; }
  });
</script>
</body>
</html>
